- eq: "Section 3.2.3 (IEKF)"
  chapter: 3
  description: "Iterated EKF: Gauss-Newton refinement of the measurement update"
  files:
    - path: "core/estimators/iterated_extended_kalman_filter.py"
      object: "IteratedExtendedKalmanFilter"
    - path: "ch3_estimators/example_iekf_range_bearing.py"
