    - "tests/core/estimators/test_iterated_extended_kalman_filter.py"
  verified_by: "tests/core/estimators/test_iterated_extended_kalman_filter.py"
  notes: "Modified residual y = z - h(x^j) + H^j (x^j - x_hat^-); update from x_hat^- with P^-. Verified: fixed point equals the Gauss-Newton MAP solution (2.7e-13)."

