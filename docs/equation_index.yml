- eq: "Eq. (2.1)"
  chapter: 2
  description: "Local body coordinate vector definition x_BODY = [x y z]^T"
  files: []
  notes: "Definition only (Section 2.1.1); no standalone function."

- eq: "Eq. (2.2)"
  chapter: 2
