# NOTE: corrected during the audit. Previously Eq. (5.3) was mapped to
# log_likelihood; the Bayes posterior (5.3) is log_posterior, and the Gaussian
# likelihood (5.6) was missing. Code verified against the book's worked example.

- eq: "Eq. (5.1)"
  chapter: 5
  description: "Nearest-Neighbor (NN): i* = argmin_i D(z, f_i)"
  files:
    - path: "core/fingerprinting/deterministic.py"
      object: "nn_localize"
    - path: "core/fingerprinting/deterministic.py"
      object: "distance"
    - path: "ch5_fingerprinting/example_deterministic.py"
      object: "main"
  tests:
    - "tests/core/fingerprinting/test_deterministic.py"
  verified_by: "tests/core/fingerprinting/test_deterministic.py"
  notes: "Euclidean or Manhattan distance metric D; returns location of nearest RP."

- eq: "Eq. (5.2)"
  chapter: 5
  description: "k-NN weighted average x_hat = sum w_i x_i / sum w_i"
  files:
    - path: "core/fingerprinting/deterministic.py"
      object: "knn_localize"
    - path: "ch5_fingerprinting/example_deterministic.py"
      object: "main"
  tests:
    - "tests/core/fingerprinting/test_deterministic.py"
  verified_by: "tests/core/fingerprinting/test_deterministic.py"
  notes: "Inverse-distance weights w_i = 1/(D + eps) or uniform."

# ------------------------------------------------------------------------------
# Probabilistic Fingerprinting
# ------------------------------------------------------------------------------

- eq: "Eq. (5.3)"
  chapter: 5
  description: "Bayes posterior P(x_i|z) = P(z|x_i) P(x_i) / P(z)"
  files:
    - path: "core/fingerprinting/probabilistic.py"
      object: "log_posterior"
    - path: "ch5_fingerprinting/example_probabilistic.py"
      object: "main"
  tests:
    - "tests/core/fingerprinting/test_probabilistic.py"
  verified_by: "tests/core/fingerprinting/test_probabilistic.py"
  notes: "Normalized in log space via log-sum-exp; uses the Gaussian likelihood (5.6)."

- eq: "Eq. (5.4)"
  chapter: 5
  description: "ML/MAP decision i* = argmax_i P(z|x_i) [P(x_i)]"
  files:
    - path: "core/fingerprinting/probabilistic.py"
      object: "map_localize"
    - path: "ch5_fingerprinting/example_probabilistic.py"
      object: "main"
  tests:
    - "tests/core/fingerprinting/test_probabilistic.py"
  verified_by: "tests/core/fingerprinting/test_probabilistic.py"
  notes: "argmax posterior; equals ML under a uniform prior (book's assumption)."

- eq: "Eq. (5.5)"
  chapter: 5
  description: "Posterior mean x_hat = sum P(x_i|z) x_i"
  files:
    - path: "core/fingerprinting/probabilistic.py"
      object: "posterior_mean_localize"
    - path: "ch5_fingerprinting/example_probabilistic.py"
      object: "main"
  tests:
    - "tests/core/fingerprinting/test_probabilistic.py"
  verified_by: "tests/core/fingerprinting/test_probabilistic.py"
  notes: "Continuous estimate E[x|z]; optional top-k truncation per book guidance."

- eq: "Eq. (5.6)"
  chapter: 5
  description: "Gaussian likelihood L_i = N(z; mu_i, sigma_i^2)"
  files:
    - path: "core/fingerprinting/probabilistic.py"
      object: "log_likelihood"
    - path: "core/fingerprinting/probabilistic.py"
      object: "fit_gaussian_naive_bayes"
  tests:
    - "tests/core/fingerprinting/test_probabilistic.py"
  verified_by: "tests/core/fingerprinting/test_probabilistic.py"
  notes: "Per-feature Gaussian; multi-AP via Naive-Bayes product (sum in log). Verified vs the book's 1D example (z=-58 -> B)."

